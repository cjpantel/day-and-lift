<!-- write-permission test -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#F4F5F8" />
<title>Day &amp; Lift</title>
<style>
  :root{
    --accent-workout:#FF5A36;
    --accent-workout-soft:#FFE7DE;
    --accent-schedule:#4C5FD5;
    --accent-schedule-soft:#E6E8FB;
    --ink:#16181D;
    --ink-soft:#6B6F76;
    --ink-faint:#A4A8AF;
    --bg:#F4F5F8;
    --card:#FFFFFF;
    --line:#EAEAEF;
    --danger:#E0473E;
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    overscroll-behavior-y:none;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .view{
    display:none;
    flex:1;
    padding:env(safe-area-inset-top,0px) 18px 0 18px;
    padding-bottom:96px;
    animation:fadeIn .18s ease;
  }
  .view.active{display:flex;flex-direction:column;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .top-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 2px 10px 2px;
  }
  .top-bar h1{font-size:22px;font-weight:800;margin:0;letter-spacing:-0.02em;}
  .week-nav{
    background:none;border:none;font-size:20px;color:var(--ink-soft);
    width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  }
  .week-nav:active{background:var(--line);}
  .today-btn{
    border:none;background:var(--line);color:var(--ink-soft);
    font-size:12px;font-weight:700;padding:6px 10px;border-radius:20px;
  }

  .day-strip{
    display:flex;justify-content:space-between;gap:4px;
    padding:4px 0 18px 0;
  }
  .day-cell{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
    background:none;border:none;padding:0;
  }
  .day-cell .wd{font-size:11px;font-weight:700;color:var(--ink-faint);}
  .day-cell .num{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:700;color:var(--ink);
    border:1.5px solid transparent;
  }
  .day-cell.today .num{border-color:var(--accent-color);}
  .day-cell.selected .num{background:var(--accent-color);color:#fff;border-color:var(--accent-color);}

  .section-label{
    font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-faint);margin:4px 2px 10px 2px;
  }

  .list{display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;display:flex;align-items:center;gap:12px;
  }
  .order-circle{
    width:30px;height:30px;border-radius:50%;background:var(--accent-color);
    color:#fff;font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .card-body{flex:1;min-width:0;}
  .card-body .name{font-weight:800;font-size:15px;line-height:1.3;}
  .card-body .sub{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .chevron{color:var(--ink-faint);font-size:18px;font-weight:700;}

  .task-card{align-items:stretch;}
  .task-time-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:0 2px 6px 2px;border-bottom:1px solid var(--line);margin-bottom:6px;
  }
  .task-time-range{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;}
  .time-start{color:var(--accent-color);}
  .time-arrow{color:var(--ink-faint);font-size:11px;}
  .time-end{color:var(--ink-soft);}
  .time-unset{color:var(--ink-faint);font-style:italic;}
  .task-meta-dur{font-size:12px;font-weight:700;color:var(--ink-faint);}
  .pin-icon{font-size:11px;opacity:0.6;}
  .overlap-badge{font-size:11px;font-weight:700;color:#fff;background:var(--danger);border-radius:8px;padding:2px 8px;margin-bottom:4px;display:inline-block;}
  .task-main-row{display:flex;align-items:center;gap:12px;}
  /* Subtask progress pill on card */
  .subtask-pill{font-size:11px;font-weight:700;color:var(--ink-faint);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 8px;margin-left:6px;white-space:nowrap;}
  .subtask-pill.done-all{color:var(--accent-schedule);border-color:var(--accent-schedule);}
  /* Subtask section in detail sheet */
  .subtask-section{margin:16px 0 0 0;}
  .subtask-section-label{font-size:12px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .subtask-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .subtask-row{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:12px;padding:10px 12px;}
  .subtask-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:transparent;}
  .subtask-check.done{background:var(--accent-schedule);border-color:var(--accent-schedule);color:#fff;}
  .subtask-text{flex:1;font-size:14px;font-weight:600;}
  .subtask-text.done{text-decoration:line-through;color:var(--ink-faint);}
  .subtask-dur-label{font-size:12px;font-weight:700;color:var(--ink-faint);white-space:nowrap;}
  .subtask-del{background:none;border:none;color:var(--ink-faint);font-size:14px;cursor:pointer;padding:0 2px;line-height:1;}
  .subtask-add-row{display:flex;gap:8px;align-items:center;}
  .subtask-add-input{flex:1;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px 12px;font-size:14px;color:var(--ink);}
  .subtask-dur-sel{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px 8px;font-size:13px;font-weight:700;color:var(--ink);-webkit-appearance:none;appearance:none;width:90px;}
  .subtask-add-btn{border:none;background:var(--accent-schedule);color:#fff;font-weight:800;font-size:18px;border-radius:12px;width:40px;height:40px;cursor:pointer;flex-shrink:0;}
  /* Subtask rows on task card (same style as main row, separated by a rule) */
  .card-subtask-rows{display:flex;flex-direction:column;}
  .card-subtask-item{border-top:1px solid var(--line);margin-top:8px;padding-top:8px;}
  /* Timeline connector between cards */
  .tl-connector{
    display:flex;flex-direction:column;align-items:center;gap:0;padding:0;
  }
  .tl-line{width:2px;height:10px;background:var(--line);flex-shrink:0;}
  .tl-connector.tight .tl-line{height:3px;}
  .tl-insert-btn{
    display:flex;align-items:center;gap:6px;
    background:none;border:1.5px dashed var(--line);border-radius:20px;
    padding:3px 10px 3px 6px;cursor:pointer;color:var(--ink-faint);
    transition:border-color .15s,color .15s,opacity .15s;
  }
  .tl-connector.tight .tl-insert-btn{padding:2px 7px;opacity:.45;border-style:solid;border-width:1px;}
  .tl-connector.tight .tl-insert-btn:active{opacity:1;border-color:var(--accent-schedule);color:var(--accent-schedule);}
  .tl-insert-btn:active{border-color:var(--accent-schedule);color:var(--accent-schedule);}
  .tl-insert-icon{font-size:14px;font-weight:800;line-height:1;}
  .tl-gap-time{font-size:12px;font-weight:700;}
  .tl-free-time{font-size:11px;font-weight:500;opacity:0.7;}
  .checkbox{
    width:24px;height:24px;border-radius:50%;border:2px solid var(--line);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;
    background:var(--card);
  }
  .checkbox.done{background:var(--accent-color);border-color:var(--accent-color);}
  .task-text{flex:1;font-size:15px;font-weight:600;line-height:1.3;}
  .task-text.done{color:var(--ink-faint);text-decoration:line-through;}
  .task-time{font-size:12px;color:var(--ink-soft);margin-top:3px;font-weight:600;}
  .task-meta{font-size:12px;color:var(--ink-faint);margin-top:3px;font-weight:600;}
  .task-del{background:none;border:none;color:var(--ink-faint);font-size:18px;padding:0 2px;}
  .task-del.confirm{color:var(--danger);font-weight:800;}
  .subtask-del.confirm{color:var(--danger);font-weight:800;font-size:12px;}

  .empty-state{
    text-align:center;color:var(--ink-faint);font-size:14px;font-weight:600;
    padding:36px 12px;
  }

  .reorderable{touch-action:pan-y;user-select:none;}
  #sched-list,#wk-list{user-select:none;}
  .wakeup-card,.tl-connector{user-select:none;}
  .reorderable.dragging{
    box-shadow:0 10px 26px rgba(20,20,30,.2);
    opacity:.97;
    z-index:5;
    position:relative;
  }

  .add-bar{
    display:flex;gap:8px;margin-top:12px;
    position:sticky;bottom:0;background:var(--bg);padding-top:6px;
  }
  .add-bar input[type=text]{
    flex:1;border:1px solid var(--line);background:var(--card);
    border-radius:14px;padding:12px 14px;font-size:15px;color:var(--ink);
    min-width:0;
  }
  .add-bar select{
    border:1px solid var(--line);background:var(--card);
    border-radius:14px;padding:12px 8px;font-size:14px;color:var(--ink);font-weight:700;
    -webkit-appearance:none;appearance:none;text-align:center;
  }
  .add-bar input::placeholder{color:var(--ink-faint);}
  .add-bar button{
    border:none;background:var(--accent-color);color:#fff;font-weight:800;
    font-size:14px;border-radius:14px;padding:0 18px;
  }
  .add-bar button:active{opacity:.8;}
  /* Workout-specific two-row add bar */
  .wk-add-bar{
    display:flex;flex-direction:column;gap:6px;
    margin-top:12px;position:sticky;bottom:0;background:var(--bg);padding-top:6px;
  }
  .wk-add-row{display:flex;gap:8px;}
  .wk-add-row input[type=text]{
    flex:1;border:1px solid var(--line);background:var(--card);
    border-radius:14px;padding:12px 14px;font-size:15px;color:var(--ink);min-width:0;
  }
  .wk-add-row input[type=text]::placeholder{color:var(--ink-faint);}
  .wk-add-row button{
    border:none;background:var(--accent-color);color:#fff;font-weight:800;
    font-size:14px;border-radius:14px;padding:0 18px;
  }
  .wk-add-row button:active{opacity:.8;}
  .wk-add-row select{
    flex:1;border:1px solid var(--line);background:var(--card);
    border-radius:14px;padding:12px 8px;font-size:14px;color:var(--ink);font-weight:700;
    -webkit-appearance:none;appearance:none;text-align:center;
  }

  .bottom-nav{
    position:fixed;left:0;right:0;bottom:0;
    max-width:480px;margin:0 auto;
    background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;padding:10px 0 8px 0;color:var(--ink-faint);font-size:11.5px;font-weight:700;
  }
  .nav-btn svg{width:24px;height:24px;}
  .nav-btn.active{color:var(--nav-accent);}

  /* Set editor sheet */
  .overlay{
    position:fixed;inset:0;background:rgba(20,20,25,.4);
    display:none;align-items:flex-end;justify-content:center;z-index:50;
  }
  .overlay.open{display:flex;}
  .sheet{
    width:100%;max-width:480px;background:var(--bg);
    border-radius:24px 24px 0 0;padding:14px 18px;
    padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));
    max-height:80vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .22s ease;
  }
  .overlay.open .sheet{transform:none;}
  .sheet-handle{width:36px;height:5px;background:var(--line);border-radius:3px;margin:0 auto 14px auto;}
  .sheet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .sheet-header h2{font-size:18px;font-weight:800;margin:0;}
  .editable-title{cursor:pointer;border-bottom:1.5px dashed transparent;transition:border-color .15s;}
  .editable-title:hover{border-bottom-color:var(--line);}
  .editable-title-input{font-size:18px;font-weight:800;border:none;border-bottom:2px solid var(--accent-color,var(--accent-schedule));background:none;color:var(--ink);outline:none;width:100%;min-width:0;}
  .sheet-icon-btn{background:var(--line);border:none;width:32px;height:32px;border-radius:50%;color:var(--ink-soft);font-size:15px;}
  .sheet-icon-btn.danger{background:#FBE3E1;color:var(--danger);}
  .set-row{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:10px 12px;margin-bottom:8px;
  }
  .set-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .set-row-top .set-num{font-weight:800;font-size:13px;color:var(--ink-soft);}
  .set-row-top .rm{background:none;border:none;color:var(--ink-faint);font-size:17px;}
  .set-fields{display:flex;gap:10px;}
  .field-group{
    flex:1;display:flex;align-items:center;gap:5px;
    background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px 10px;
  }
  .field-group input{
    width:30px;flex:0 0 auto;border:none;background:none;font-size:15px;font-weight:700;
    color:var(--ink);text-align:center;padding:0;
  }
  .field-group .sep{color:var(--ink-faint);font-weight:700;}
  .field-group .unit{font-size:11px;color:var(--ink-faint);font-weight:700;margin-left:auto;}
  .add-set-btn{
    width:100%;border:1.5px dashed var(--line);background:none;color:var(--accent-workout);
    font-weight:800;font-size:14px;border-radius:14px;padding:12px;margin-top:4px;
  }
  .wk-add-more-btn{
    width:100%;border:1.5px dashed var(--line);background:none;color:var(--accent-workout);
    font-weight:800;font-size:14px;border-radius:14px;padding:13px;margin-top:4px;cursor:pointer;
  }
  .add-photo-btn{
    width:100%;border:1.5px dashed var(--line);background:none;color:var(--accent-schedule);
    font-weight:800;font-size:14px;border-radius:14px;padding:12px;margin-top:4px;
  }
  .dur-row{
    display:flex;align-items:center;gap:8px;margin-bottom:14px;
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;
  }
  .dur-row .dur-label{font-size:14px;font-weight:700;color:var(--ink-soft);flex:1;}
  .dur-row input{
    width:64px;border:none;background:none;font-size:15px;font-weight:700;
    color:var(--ink);text-align:right;padding:0;
  }
  .dur-row .dur-unit{font-size:13px;color:var(--ink-faint);font-weight:700;}
  .task-notes{
    width:100%;min-height:90px;border:1px solid var(--line);background:var(--card);
    border-radius:14px;padding:12px 14px;font-size:15px;color:var(--ink);
    font-family:inherit;resize:vertical;margin-bottom:14px;
  }
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .photo-thumb{
    position:relative;width:84px;height:84px;border-radius:12px;overflow:hidden;
    border:1px solid var(--line);
  }
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-thumb .photo-rm{
    position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;
    background:rgba(0,0,0,.55);color:#fff;border:none;font-size:12px;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .photo-error{color:var(--danger);font-size:12px;font-weight:700;margin-top:4px;min-height:14px;}
  .delete-exercise-row{margin-top:18px;text-align:center;}
  .delete-exercise-row button{background:none;border:none;color:var(--danger);font-weight:700;font-size:14px;}
  .settings-cog{background:none;border:none;color:var(--ink-soft);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
  .settings-cog:active{background:var(--line);}
  .settings-row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;}
  .settings-row-label{flex:1;}
  .settings-row-title{font-size:15px;font-weight:700;color:var(--ink);}
  .settings-row-sub{font-size:12px;color:var(--ink-faint);margin-top:2px;}
  .settings-select{border:1px solid var(--line);background:var(--bg);border-radius:10px;padding:8px 10px;font-size:14px;font-weight:700;color:var(--ink);-webkit-appearance:none;appearance:none;text-align:center;}
  .wakeup-card{background:var(--accent-schedule-soft);border:1px solid var(--accent-schedule-soft);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:4px;cursor:pointer;}
  .wakeup-card .wakeup-label{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-schedule);}
  .wakeup-card .wakeup-time{font-size:18px;font-weight:800;color:var(--ink);}
  .wakeup-card .wakeup-tap{font-size:12px;color:var(--ink-soft);}
  /* Calendar */
  .cal-btn{background:var(--line);border:none;width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);flex-shrink:0;}
  .cal-btn:active{background:var(--accent-schedule-soft);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:12px 0;}
  .cal-wd{text-align:center;font-size:11px;font-weight:800;color:var(--ink-faint);padding:4px 0;}
  .cal-day{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    border:none;background:none;border-radius:50%;font-size:14px;font-weight:600;color:var(--ink);
  }
  .cal-day.other-month{color:var(--ink-faint);}
  .cal-day.today{border:1.5px solid var(--accent-schedule);color:var(--accent-schedule);}
  .cal-day.selected{background:var(--accent-schedule);color:#fff;}
  .cal-day:active{background:var(--accent-schedule-soft);}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .cal-nav h3{font-size:17px;font-weight:800;margin:0;}
  .cal-nav-btn{background:none;border:none;font-size:22px;color:var(--ink-soft);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .cal-nav-btn:active{background:var(--line);}
  /* All-day section */
  #sched-scroll-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
  #sched-allday-section{padding:0 0 4px 0;}
  .allday-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .allday-label{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);}
  .allday-add-btn{background:none;border:1.5px solid var(--line);width:24px;height:24px;border-radius:50%;color:var(--ink-faint);font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1;}
  .allday-input{width:100%;border:1px dashed var(--line);background:none;border-radius:12px;padding:10px 14px;font-size:14px;color:var(--ink);margin-top:6px;display:none;}
  .allday-input.visible{display:block;}
  .allday-input::placeholder{color:var(--ink-faint);}
  .allday-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;touch-action:pan-y;user-select:none;}
  .allday-card.dragging{opacity:.3;}
  .allday-divider{height:1px;background:var(--line);margin:10px 0 14px 0;}
  /* Drop indicator */
  .drop-indicator{height:3px;background:var(--accent-schedule);border-radius:2px;margin:4px 0;display:none;}
  .drop-indicator.visible{display:block;}
  /* Drag ghost */
  #drag-ghost{position:fixed;left:18px;right:18px;pointer-events:none;z-index:200;opacity:.92;box-shadow:0 10px 26px rgba(20,20,30,.25);border-radius:14px;background:var(--card);border:1px solid var(--line);padding:11px 14px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--ink);}
</style>
</head>
<body>
<div id="app">

  <!-- SCHEDULE VIEW -->
  <main class="view active" id="view-schedule" style="--accent-color:var(--accent-schedule);">
    <div class="top-bar">

<script>
(function(){
  "use strict";

  const APP_VERSION = "1.1";

  /* ---------- date helpers ---------- */
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function dateKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function startOfWeek(d){
    const day = d.getDay(); // 0 Sun .. 6 Sat
    const diff = (day===0 ? -6 : 1-day);
    const m = new Date(d);
    m.setDate(d.getDate()+diff);
    m.setHours(0,0,0,0);
    return m;
  }
  function addDays(d, n){ const c = new Date(d); c.setDate(c.getDate()+n); return c; }
  function fmtLabel(d){
    return d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
  }
  const WD = ["M","T","W","T","F","S","S"];

  /* ---------- storage ---------- */
  function load(key){
    try{ return JSON.parse(localStorage.getItem(key) || "{}"); }
    catch(e){ return {}; }
  }
  function save(key, data){
    try{ localStorage.setItem(key, JSON.stringify(data)); return true; }
    catch(e){ console.error("Storage failed", e); return false; }
  }
  let workouts = load("dl_workouts");
  let schedule = load("dl_schedule");
  let settings = load("dl_settings"); // { defaultWakeup: "07:00", wakeupTimes: { "2024-01-01": "06:30" } }

  /* ---------- shared state ---------- */
  const today = new Date();
  let selectedDate = new Date(today);
  let weekStart = startOfWeek(today);

  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  /* ---------- long-press drag-to-reorder (shared by both lists) ---------- */
  function makeReorderable(listEl, onReorder){
    const LONG_PRESS_MS = 380;
    const CANCEL_PX = 10;
    let timer = null, dragEl = null, dragging = false, startY = 0, justDragged = false;

    function clear(){
      clearTimeout(timer); timer = null;
      if(dragEl){ dragEl.classList.remove("dragging"); dragEl.style.transform = ""; }
      dragEl = null; dragging = false;
    }

    function flip(el, beforeRect){
      const afterRect = el.getBoundingClientRect();
      const dy = beforeRect.top - afterRect.top;
      if(Math.abs(dy) < 1) return;
      el.style.transition = "none";
      el.style.transform = "translateY("+dy+"px)";
      requestAnimationFrame(function(){
        el.style.transition = "transform .15s ease";
        el.style.transform = "";
      });
    }

    listEl.addEventListener("selectstart", function(e){ if(timer || dragging) e.preventDefault(); });

    listEl.addEventListener("pointerdown", function(e){
      const row = e.target.closest(".reorderable");
      if(!row || row.parentElement !== listEl) return;
      if(e.target.closest("button, input")) return;
      e.preventDefault();
      startY = e.clientY;
      clearTimeout(timer);
      timer = setTimeout(function(){
        dragEl = row; dragging = true;
        row.classList.add("dragging");
        row.style.transform = "scale(1.02)";
        try{ listEl.setPointerCapture(e.pointerId); }catch(_){}
      }, LONG_PRESS_MS);
    });

    listEl.addEventListener("pointermove", function(e){
      if(!dragging){
        if(timer && Math.abs(e.clientY - startY) > CANCEL_PX){ clearTimeout(timer); timer = null; }
        return;
      }
      e.preventDefault();
      const dy = e.clientY - startY;
      dragEl.style.transform = "translateY("+dy+"px) scale(1.02)";
      const rows = Array.from(listEl.querySelectorAll(".reorderable"));
      const curIndex = rows.indexOf(dragEl);
      const dragRect = dragEl.getBoundingClientRect();
      const centerY = dragRect.top + dragRect.height/2;
      for(let i=0;i<rows.length;i++){
        const sib = rows[i];
        if(sib === dragEl) continue;
        const r = sib.getBoundingClientRect();
        const sibCenter = r.top + r.height/2;
        if(i < curIndex && centerY < sibCenter){
          const before = sib.getBoundingClientRect();
          listEl.insertBefore(dragEl, sib);
          flip(sib, before);
          startY = e.clientY;
          dragEl.style.transform = "scale(1.02)";
          break;
        } else if(i > curIndex && centerY > sibCenter){
          const before = sib.getBoundingClientRect();
          listEl.insertBefore(dragEl, sib.nextSibling);
          flip(sib, before);
          startY = e.clientY;
          dragEl.style.transform = "scale(1.02)";
          break;
        }
      }
    }, { passive:false });

    function endDrag(){
      clearTimeout(timer); timer = null;
      if(dragging && dragEl){
        const ids = Array.from(listEl.querySelectorAll(".reorderable")).map(function(r){ return r.dataset.id; });
        clear();
        justDragged = true;
        onReorder(ids);
      } else {
        clear();
      }
    }
    listEl.addEventListener("pointerup", endDrag);
    listEl.addEventListener("pointercancel", endDrag);

    listEl.addEventListener("click", function(e){
      if(justDragged){ e.stopPropagation(); e.preventDefault(); justDragged = false; }
    }, true);
  }

  /* ---------- day strip rendering (shared by both tabs) ---------- */
  function renderStrip(container, onPick){
    container.innerHTML = "";
    for(let i=0;i<7;i++){
      const d = addDays(weekStart, i);
      const key = dateKey(d);
      const cell = document.createElement("button");
      cell.className = "day-cell";
      if(key === dateKey(today)) cell.classList.add("today");
      if(key === dateKey(selectedDate)) cell.classList.add("selected");
      cell.innerHTML = '<span class="wd">'+WD[i]+'</span><span class="num">'+d.getDate()+'</span>';
      cell.addEventListener("click", function(){
        selectedDate = d;
        onPick();
      });
      container.appendChild(cell);
    }
  }

  function goToday(){
    selectedDate = new Date(today);
    weekStart = startOfWeek(today);
  }

  /* ================= WORKOUT TAB ================= */
  const wkStripEl = document.getElementById("wk-strip");
  const wkListEl = document.getElementById("wk-list");
  const wkLabelEl = document.getElementById("wk-date-label");

  function renderWorkout(){
    renderStrip(wkStripEl, renderWorkout);
    wkLabelEl.textContent = fmtLabel(selectedDate);
    const key = dateKey(selectedDate);
    const items = workouts[key] || [];
    wkListEl.innerHTML = "";
    if(items.length === 0){
      wkListEl.innerHTML = '<div class="empty-state">No exercises yet for this day.<br>Add one below to get started.</div>';
      return;
    }
    items.forEach(function(ex, idx){
      const card = document.createElement("div");
      card.className = "card reorderable";
      card.dataset.id = ex.id;
      const setsDone = ex.sets.length;
      const repsStr = exRepsLabel(ex.sets);
      const subLine = setsDone + ' Set' + (setsDone===1?"":"s") + (repsStr ? ' · ' + repsStr : '');
      card.innerHTML =
        '<div class="order-circle">'+(idx+1)+'</div>'+
        '<div class="card-body"><div class="name">'+escapeHtml(ex.name)+'</div>'+
        '<div class="sub">'+subLine+'</div></div>'+
        (ex.notes ? '<div style="font-size:12px;color:var(--ink-faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;">📝 '+escapeHtml(ex.notes.split('\n')[0])+'</div>' : '')+
        '<div class="chevron">›</div>';
      card.addEventListener("click", function(){ openSetEditor(key, ex.id); });
      wkListEl.appendChild(card);
    });
    // + button after last exercise
    const addMoreBtn = document.createElement("button");
    addMoreBtn.className = "wk-add-more-btn";
    addMoreBtn.textContent = "+ Add Exercise";
    addMoreBtn.addEventListener("click", function(){
      const input = document.getElementById("wk-input");
      input.focus();
      input.scrollIntoView({ behavior: "smooth", block: "center" });
    });
    wkListEl.appendChild(addMoreBtn);
  }

  document.getElementById("wk-prev").addEventListener("click", function(){ weekStart = addDays(weekStart,-7); renderWorkout(); });
  document.getElementById("wk-next").addEventListener("click", function(){ weekStart = addDays(weekStart, 7); renderWorkout(); });

  document.getElementById("wk-add").addEventListener("click", addExercise);
  document.getElementById("wk-input").addEventListener("keydown", function(e){ if(e.key==="Enter") addExercise(); });

  function exRepsLabel(sets){
    if(!sets || !sets.length) return "";
    const s = sets.find(function(x){ return x.repsMin !== null || x.repsMax !== null; });
    if(!s) return "";
    const lo = s.repsMin, hi = s.repsMax;
    if(lo !== null && hi !== null && lo !== hi) return lo + "–" + hi + " reps";
    const v = lo !== null ? lo : hi;
    return v !== null ? v + " reps" : "";
  }

  function addExercise(){
    const input = document.getElementById("wk-input");
    const setsInput = document.getElementById("wk-sets-input");
    const repsInput = document.getElementById("wk-reps-input");
    const name = input.value.trim();
    if(!name) return;
    let count = parseInt(setsInput.value, 10);
    if(!count || count < 1) count = 1;
    let repsMin = null, repsMax = null;
    if(repsInput.value){
      const parts = repsInput.value.split("-");
      repsMin = parseInt(parts[0], 10) || null;
      repsMax = parseInt(parts[1] || parts[0], 10) || null;
    }
    const key = dateKey(selectedDate);
    if(!workouts[key]) workouts[key] = [];
    const sets = [];
    for(let i=0;i<count;i++) sets.push({ weight: null, repsMin: repsMin, repsMax: repsMax });
    workouts[key].push({ id: uid(), name: name, sets: sets });
    save("dl_workouts", workouts);
    input.value = "";
    renderWorkout();
  }

  function reorderWorkout(idsInOrder){
    const key = dateKey(selectedDate);
    const arr = workouts[key] || [];
    const byId = {};
    arr.forEach(function(e){ byId[e.id] = e; });
    workouts[key] = idsInOrder.map(function(id){ return byId[id]; }).filter(Boolean);
    save("dl_workouts", workouts);
    renderWorkout();
  }
  makeReorderable(wkListEl, reorderWorkout);

  /* ---------- set editor sheet ---------- */
  const overlay = document.getElementById("set-overlay");
  const setsContainer = document.getElementById("sets-container");
  const sheetTitle = document.getElementById("sheet-title");
  let activeDayKey = null, activeExId = null;

  function currentExercise(){
    const list = workouts[activeDayKey] || [];
    return list.find(function(e){ return e.id === activeExId; });
  }

  function openSetEditor(dayKey, exId){
    activeDayKey = dayKey; activeExId = exId;
    const ex = currentExercise();
    if(!ex) return;
    sheetTitle.textContent = ex.name;

  /* ================= SCHEDULE TAB ================= */
  const schedStripEl = document.getElementById("sched-strip");
  const schedListEl = document.getElementById("sched-list");
  const schedLabelEl = document.getElementById("sched-date-label");

  function minutesToTimeStr(totalMin){
    totalMin = ((Math.round(totalMin) % 1440) + 1440) % 1440;
    return pad(Math.floor(totalMin/60))+":"+pad(totalMin%60);
  }

  function renderSchedule(){
    renderStrip(schedStripEl, renderSchedule);
    schedLabelEl.textContent = fmtLabel(selectedDate);
    const key = dateKey(selectedDate);
    const items = (schedule[key] || []).filter(function(t){ return !t.allDay; });

    // Compute cascading display start times (manual order respected)
    // Seed cascade from wake-up time if no explicit time on first task
    const wakeupSeed = (settings.wakeupTimes && settings.wakeupTimes[key]) || settings.defaultWakeup || null;
    let prevEndMin = wakeupSeed ? timeToMinutes(wakeupSeed) : null;
    const dispStartMin = items.map(function(task){
      let startMin = null;
      if(task.time){ startMin = timeToMinutes(task.time); }
      else if(prevEndMin !== null){ startMin = prevEndMin; }
      prevEndMin = (startMin !== null && task.duration) ? startMin + task.duration : null;
      return startMin;
    });

    schedListEl.innerHTML = "";

    // Wake Up card always shown first
    const wakeupTime = (settings.wakeupTimes && settings.wakeupTimes[key]) || settings.defaultWakeup || null;
    const wakeupCard = document.createElement("div");
    wakeupCard.className = "wakeup-card";
    wakeupCard.innerHTML =
      '<div class="wakeup-label">Wake Up</div>'+
      '<div class="wakeup-time">'+(wakeupTime ? formatTime(wakeupTime) : "Tap to set time")+'</div>'+
      '<div class="wakeup-tap">'+(wakeupTime ? "Tap to change" : "No time set")+'</div>';
    wakeupCard.addEventListener("click", function(){ openWakeupSheet(key); });
    schedListEl.appendChild(wakeupCard);

    // Timeline connector after wake-up card
    const wt = (settings.wakeupTimes && settings.wakeupTimes[key]) || settings.defaultWakeup || "";
    const wakeupConnector = document.createElement("div");
    wakeupConnector.className = "tl-connector";
    (function(){
      const gapMin = (wt && items.length > 0 && dispStartMin[0] !== null)
        ? dispStartMin[0] - timeToMinutes(wt) : null;
      const tight = gapMin !== null && gapMin <= 0;
      if(tight) wakeupConnector.classList.add("tight");
      const wuFreeLabel = (gapMin !== null && gapMin > 60) ? formatFreeTime(gapMin) + " free" : "";
      wakeupConnector.innerHTML =
        '<div class="tl-line"></div>'+
        '<button class="tl-insert-btn" title="Add task here">'+
          '<span class="tl-insert-icon">+</span>'+
          (wt ? '<span class="tl-gap-time">'+formatTime(wt)+'</span>' : '')+
          (wuFreeLabel ? '<span class="tl-free-time">'+wuFreeLabel+'</span>' : '')+
        '</button>'+
        '<div class="tl-line"></div>';
      wakeupConnector.querySelector(".tl-insert-btn").addEventListener("click", function(e){
        e.stopPropagation();
        openInsertSheet(key, 0, wt, gapMin > 0 ? snapDuration(gapMin) : null);
      });
    })();
    schedListEl.appendChild(wakeupConnector);

    if(typeof renderAlldayList === "function") renderAlldayList();
    if(items.length === 0) return;
    items.forEach(function(task, idx){
      const wrapper = document.createElement("div");
      wrapper.className = "reorderable";
      wrapper.dataset.id = task.id;
      wrapper.style.cssText = "display:flex;flex-direction:column;gap:0;";

      const card = document.createElement("div");
      card.className = "card task-card";
      card.style.flexDirection = "column";
      card.style.gap = "4px";

      const metaBits = [];
      if(task.notes) metaBits.push("📝");
      if(task.images && task.images.length) metaBits.push("📷 "+task.images.length);
      const subs = task.subtasks || [];
      const subsDone = subs.filter(function(s){ return s.done; }).length;

      const sm = dispStartMin[idx];
      const em = (sm !== null && task.duration) ? sm + task.duration : null;
      const startLabel = sm !== null ? formatTime(minutesToTimeStr(sm)) : "";
      const endLabel   = em !== null ? formatTime(minutesToTimeStr(em)) : "";
      const durLabel   = task.duration ? (task.duration < 60 ? task.duration+" min" : task.duration === 60 ? "1 hr" : task.duration === 90 ? "1.5 hr" : "2 hr") : "";

      // Overlap detection for pinned tasks: check if previous task ends after this task's start
      const prevTask = idx > 0 ? items[idx - 1] : null;
      const prevEndForOverlap = idx > 0 ? dispStartMin[idx - 1] + (prevTask && prevTask.duration ? prevTask.duration : 0) : null;
      const isOverlap = task.pinned && task.time && prevEndForOverlap !== null && prevEndForOverlap > timeToMinutes(task.time);

      // Time bar
      const timeBar = document.createElement("div");
      timeBar.className = "task-time-bar";
      timeBar.innerHTML =
        '<div class="task-time-range">'+
          (task.pinned ? '<span class="pin-icon" title="Time pinned">📌</span>' : '')+
          (startLabel ? '<span class="time-start">'+startLabel+'</span>' : '')+
          (startLabel && endLabel ? '<span class="time-arrow">→</span>' : '')+
          (endLabel ? '<span class="time-end">'+endLabel+'</span>' : '')+
          (!startLabel && !endLabel ? '<span class="time-unset">No time set</span>' : '')+
        '</div>'+
        (durLabel ? '<span class="task-meta-dur">'+durLabel+'</span>' : '');
      if(isOverlap){
        const overlapBadge = document.createElement("div");
        overlapBadge.className = "overlap-badge";
        overlapBadge.textContent = "⚠ Overlap";
        card.appendChild(overlapBadge);
      }
      card.appendChild(timeBar);

      // Build an item row (obj = task or subtask, deleteItem = fn to call on confirmed delete)
      function makeCardItemRow(obj, extraMeta, deleteItem, isNotFirst){
        const row = document.createElement("div");
        row.className = "task-main-row" + (isNotFirst ? " card-subtask-item" : "");

        const chk = document.createElement("button");
        chk.className = "checkbox" + (obj.done ? " done" : "");
        chk.textContent = obj.done ? "✓" : "";
        chk.addEventListener("click", function(e){
          e.stopPropagation();
          obj.done = !obj.done;
          save("dl_schedule", schedule);
          renderSchedule();
        });

        const body = document.createElement("div");
        body.style.cssText = "flex:1;min-width:0;";
        body.innerHTML = '<div class="task-text'+(obj.done?" done":"")+'">'+escapeHtml(obj.text)+'</div>'+
          (extraMeta ? '<div class="task-meta">'+extraMeta+'</div>' : '');

        const del = document.createElement("button");
        del.className = "task-del";
        del.textContent = "✕";
        del.addEventListener("click", function(e){
          e.stopPropagation();
          if(!del.classList.contains("confirm")){
            del.classList.add("confirm"); del.textContent = "Sure?";
            setTimeout(function(){ del.classList.remove("confirm"); del.textContent = "✕"; }, 2500);
            return;
          }
          deleteItem();
        });

        row.appendChild(chk); row.appendChild(body); row.appendChild(del);
        return row;
      }

      function deleteWholeCard(){
        const list = schedule[key] || [];
        const i = list.findIndex(function(t){ return t.id === task.id; });
        if(i > -1) list.splice(i, 1);
        save("dl_schedule", schedule);
        renderSchedule();
      }

      // Main item row
      const mainMeta = [
        task.selfDuration ? durLabel(task.selfDuration) : "",
        metaBits.join("  ")
      ].filter(Boolean).join("  ");
      card.appendChild(makeCardItemRow(task, mainMeta, function(){
        if(subs.length){
          // promote first subtask
          const p = subs.splice(0,1)[0];
          task.text = p.text; task.selfDuration = p.duration||null; task.done = p.done;
          save("dl_schedule", schedule); renderSchedule();
        } else {
          deleteWholeCard();
        }
      }, false));

      // Subtask rows
      subs.forEach(function(s, si){
        const subMeta = s.duration ? durLabel(s.duration) : "";
        card.appendChild(makeCardItemRow(s, subMeta, function(){
          subs.splice(si, 1);
          save("dl_schedule", schedule); renderSchedule();
        }, true));
      });

      card.addEventListener("click", function(e){
        if(e.target.closest("button")) return;
        openTaskDetail(key, task.id);
      });

      // Timeline connector with insert button
      const smLocal = dispStartMin[idx];
      const emLocal = (smLocal !== null && task.duration) ? smLocal + task.duration : smLocal;
      const nextStart = (idx + 1 < dispStartMin.length) ? dispStartMin[idx + 1] : null;
      const gapMin = (emLocal !== null && nextStart !== null) ? nextStart - emLocal : null;
      const tight = gapMin !== null && gapMin <= 0;
      const connector = document.createElement("div");
      connector.className = tight ? "tl-connector tight" : "tl-connector";
      const gapLabel = (!tight && emLocal !== null) ? formatTime(minutesToTimeStr(emLocal)) : "";
      const freeLabel = (gapMin !== null && gapMin > 60) ? formatFreeTime(gapMin) + " free" : "";
      connector.innerHTML =
        '<div class="tl-line"></div>'+
        '<button class="tl-insert-btn" title="Add task here">'+
          '<span class="tl-insert-icon">+</span>'+
          (gapLabel ? '<span class="tl-gap-time">'+gapLabel+'</span>' : '')+
          (freeLabel ? '<span class="tl-free-time">'+freeLabel+'</span>' : '')+
        '</button>'+
        '<div class="tl-line"></div>';
      connector.querySelector(".tl-insert-btn").addEventListener("click", function(e){
        e.stopPropagation();
        const sugTime = emLocal !== null ? minutesToTimeStr(emLocal) : "";
        openInsertSheet(key, idx + 1, sugTime, gapMin > 0 ? snapDuration(gapMin) : null);
      });

      wrapper.appendChild(card);
      wrapper.appendChild(connector);
      schedListEl.appendChild(wrapper);
    });
  }

  function timeToMinutes(t){
    const p = t.split(":");
    return parseInt(p[0],10)*60+parseInt(p[1],10);
  }

  function formatFreeTime(min){
    const rounded = Math.round(min / 15) * 15;
    const h = Math.floor(rounded / 60);
    const m = rounded % 60;
    if(h > 0 && m > 0) return h + "h " + m + "m";
    if(h > 0) return h + "h";
    return m + "m";
  }

  function formatTime(t){
    const parts = t.split(":");
    let h = parseInt(parts[0],10), m = parts[1];
    const ampm = h>=12 ? "PM" : "AM";
    h = h % 12; if(h===0) h = 12;
    return h+":"+m+" "+ampm;
  }

  document.getElementById("sched-prev").addEventListener("click", function(){ weekStart = addDays(weekStart,-7); renderSchedule(); });
  document.getElementById("sched-next").addEventListener("click", function(){ weekStart = addDays(weekStart, 7); renderSchedule(); });

  document.getElementById("sched-add").addEventListener("click", addTask);
  document.getElementById("sched-input").addEventListener("keydown", function(e){ if(e.key==="Enter") addTask(); });

  function addTask(){
    const textInput = document.getElementById("sched-input");
    const timeInput = document.getElementById("sched-time");
    const durInput = document.getElementById("sched-dur");
    const text = textInput.value.trim();
    if(!text) return;
    const durVal = parseInt(durInput.value, 10);
    const duration = durVal > 0 ? durVal : null;
    const key = dateKey(selectedDate);
    if(!schedule[key]) schedule[key] = [];
    const isAllDay = !timeInput.value && !duration;
    schedule[key].push({ id: uid(), text: text, allDay: isAllDay, time: isAllDay ? null : (timeInput.value || null), duration: isAllDay ? null : duration, done: false });
    save("dl_schedule", schedule);
    textInput.value = ""; timeInput.selectedIndex = 0; durInput.selectedIndex = 0;
    renderSchedule();
    renderAlldayList();
  }

  function reorderSchedule(idsInOrder){
    const key = dateKey(selectedDate);
    const arr = schedule[key] || [];
    const byId = {};
    arr.forEach(function(t){ byId[t.id] = t; });
    const alldayTasks = arr.filter(function(t){ return t.allDay; });
    const oldTimedTasks = arr.filter(function(t){ return !t.allDay; });
    const timedTasks = idsInOrder.map(function(id){ return byId[id]; }).filter(Boolean);

    // Cascade times from the anchor (old first task's time, or wakeup seed)
    const wakeupSeed = (settings.wakeupTimes && settings.wakeupTimes[key]) || settings.defaultWakeup || null;
    let anchorMin = null;
    if(oldTimedTasks.length > 0 && oldTimedTasks[0].time){
      anchorMin = timeToMinutes(oldTimedTasks[0].time);
    } else if(wakeupSeed){
      anchorMin = timeToMinutes(wakeupSeed);
    }
    let prevEndMin = anchorMin;
    timedTasks.forEach(function(task){
      if(task.pinned){
        // pinned: keep its time, but update prevEndMin based on its fixed time
        prevEndMin = task.time ? (task.duration ? timeToMinutes(task.time) + task.duration : null) : prevEndMin;
        return;
      }
      if(prevEndMin !== null){
        task.time = minutesToTimeStr(prevEndMin);
        prevEndMin = task.duration ? prevEndMin + task.duration : null;
      } else if(task.time){
        prevEndMin = task.duration ? timeToMinutes(task.time) + task.duration : null;
      }
    });

    schedule[key] = alldayTasks.concat(timedTasks);
    save("dl_schedule", schedule);
    renderSchedule();
  }
  makeReorderable(schedListEl, reorderSchedule);

  /* ---------- 15-minute time picker ---------- */
  function populateTimeSelect(sel){
    const blank = document.createElement("option");
    blank.value = ""; blank.textContent = "Select Time";
    sel.appendChild(blank);
    for(let m=0; m<24*60; m+=15){
      const value = pad(Math.floor(m/60))+":"+pad(m%60);
      const opt = document.createElement("option");
      opt.value = value;
      opt.textContent = formatTime(value);
      sel.appendChild(opt);
    }
  }

  function populateDurSelect(sel){
    const blank = document.createElement("option");
    blank.value = ""; blank.textContent = "Duration";
    sel.appendChild(blank);
    for(let m=0; m<=60; m+=15){
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m === 0 ? "0 min" : m < 60 ? m+" min" : "1 hr";
      sel.appendChild(opt);
    }
    for(let m=90; m<=120; m+=30){
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m === 90 ? "1.5 hr" : "2 hr";
      sel.appendChild(opt);
    }
  }

  /* ---------- task detail sheet (notes + photos) ---------- */
  const taskOverlay = document.getElementById("task-overlay");
  const taskNotesEl = document.getElementById("task-notes");
  const taskDurInput = document.getElementById("task-dur-input");
  const taskTimeInput = document.getElementById("task-time-input");
  const taskPhotoGrid = document.getElementById("task-photo-grid");
  const taskPhotoInput = document.getElementById("task-photo-input");
  const taskPhotoError = document.getElementById("task-photo-error");
  let activeTaskDayKey = null, activeTaskId = null;

  // Makes an <h2> element inline-editable on click, calls onSave(newText) on commit
  function makeEditableTitle(el, onSave){
    el.addEventListener("click", function(e){
      if(el.querySelector("input")) return;
      const current = el.textContent;
      const input = document.createElement("input");
      input.type = "text";
      input.value = current;
      input.className = "editable-title-input";
      el.textContent = "";
      el.appendChild(input);
      input.focus();
      input.select();
      function commit(){
        const val = input.value.trim();
        el.textContent = val || current;
        if(val && val !== current) onSave(val);
      }
      input.addEventListener("blur", commit);
      input.addEventListener("keydown", function(e){
        if(e.key === "Enter"){ e.preventDefault(); input.blur(); }
        if(e.key === "Escape"){ input.value = current; input.blur(); }
      });
    });
  }

  // Wire up exercise title editable
  makeEditableTitle(document.getElementById("sheet-title"), function(newName){

    if(!ex) return;
    ex.name = newName;

  function durLabel(min){ return !min?"":(min<60?min+" min":min===60?"1 hr":min===90?"1.5 hr":"2 hr"); }

  function makeInlineEdit(el, getCur, onSave){
    el.style.cursor = "pointer";
    el.addEventListener("click", function(){
      if(el.querySelector("input")) return;
      const cur = getCur();
      const inp = document.createElement("input");
      inp.type = "text"; inp.value = cur;
      inp.style.cssText = "flex:1;border:none;border-bottom:2px solid var(--accent-schedule);background:none;font-size:inherit;font-weight:inherit;color:var(--ink);outline:none;width:100%;";
      el.textContent = ""; el.appendChild(inp);
      inp.focus(); inp.select();
      function commit(){ const v=inp.value.trim(); el.textContent=v||cur; if(v&&v!==cur){onSave(v);} }
      inp.addEventListener("blur", commit);
      inp.addEventListener("keydown", function(e){ if(e.key==="Enter"){e.preventDefault();inp.blur();} if(e.key==="Escape"){inp.value=cur;inp.blur();} });
    });
  }

  // Guard against ghost-clicks on delete buttons right after a select closes
  let selectJustChanged = false;
  function markSelectChanged(){ selectJustChanged = true; setTimeout(function(){ selectJustChanged = false; }, 400); }

  function renderTaskItems(){
    const task = currentTask();
    if(!task) return;
    const listEl = document.getElementById("task-item-list");
    listEl.innerHTML = "";

    // All items rendered identically: checkbox · name · dur select · delete
    function buildRow(obj, isFirst){
      const row = document.createElement("div");
      row.style.cssText = "display:flex;align-items:center;gap:10px;padding:12px 14px;"+(isFirst?"":"border-top:1px solid var(--line);");

      const check = document.createElement("button");
      check.className = "checkbox" + (obj.done ? " done" : "");
      check.textContent = obj.done ? "✓" : "";
      check.addEventListener("click", function(){
        obj.done = !obj.done;
        save("dl_schedule", schedule);
        renderTaskItems();
        renderSchedule();
      });

      const nameEl = document.createElement("div");
      nameEl.className = "task-text" + (obj.done ? " done" : "");
      nameEl.style.cssText = "flex:1;min-width:0;";
      nameEl.textContent = obj.text;
      makeInlineEdit(nameEl, function(){ return obj.text; }, function(v){
        obj.text = v;
        save("dl_schedule", schedule);
        renderTaskItems();
        renderSchedule();
      });

      const del = document.createElement("button");
      del.className = "subtask-del";
      del.textContent = "✕";
      del.addEventListener("click", function(e){
        e.stopPropagation();
        if(selectJustChanged) return;
        if(!del.classList.contains("confirm")){
          del.classList.add("confirm"); del.textContent = "Sure?";
          setTimeout(function(){ del.classList.remove("confirm"); del.textContent = "✕"; }, 2500);
          return;
        }
        if(isFirst){
          if(task.subtasks && task.subtasks.length){
            const promoted = task.subtasks.splice(0,1)[0];
            task.text = promoted.text;
            task.selfDuration = promoted.duration || null;
            task.done = promoted.done;
            save("dl_schedule", schedule);
            renderTaskItems(); renderSchedule();
          } else {
            // last item — delete whole card
            const list = schedule[activeTaskDayKey] || [];
            const i = list.findIndex(function(t){ return t.id === task.id; });
            if(i > -1) list.splice(i, 1);
            save("dl_schedule", schedule);
            taskOverlay.classList.remove("open");
            renderSchedule();
          }
        } else {
          const i = (task.subtasks||[]).findIndex(function(s){ return s.id === obj.id; });
          if(i > -1) task.subtasks.splice(i, 1);
          save("dl_schedule", schedule);
          renderTaskItems(); renderSchedule();
        }
      });

      row.appendChild(check);
      row.appendChild(nameEl);
      row.appendChild(del);
      return row;
    }

    listEl.appendChild(buildRow(task, true));
    (task.subtasks || []).forEach(function(sub){
      listEl.appendChild(buildRow(sub, false));
    });
  }

  document.getElementById("subtask-add-btn").addEventListener("click", function(){
    const input = document.getElementById("subtask-input");
    const text = input.value.trim();
    if(!text) return;
    const task = currentTask();
    if(!task) return;
    if(!task.subtasks) task.subtasks = [];
    task.subtasks.push({ id: uid(), text: text, done: false });
    save("dl_schedule", schedule);
    input.value = "";
    renderTaskItems();
    renderSchedule();
  });
  document.getElementById("subtask-input").addEventListener("keydown", function(e){
    if(e.key === "Enter") document.getElementById("subtask-add-btn").click();
  });

  function renderTaskPhotos(){
    const task = currentTask();
    if(!task) return;
    taskPhotoGrid.innerHTML = "";
    (task.images || []).forEach(function(src, i){
      const thumb = document.createElement("div");
      thumb.className = "photo-thumb";
      thumb.innerHTML = '<img src="'+src+'"><button class="photo-rm">✕</button>';
      thumb.querySelector(".photo-rm").addEventListener("click", function(){

    });

  // Cascade: if subsequent tasks were exactly back-to-back with task, shift them by delta.
  // oldEndMin = task's end time BEFORE the change was applied.
  function cascadeAfterTaskChange(task, oldEndMin){
    const key = activeTaskDayKey;
    const items = (schedule[key] || []).filter(function(t){ return !t.allDay; });
    const idx = items.findIndex(function(t){ return t.id === task.id; });
    if(idx < 0 || !task.time || !task.duration || oldEndMin === null || oldEndMin === undefined) return;

    const newEndMin = timeToMinutes(task.time) + task.duration;
    const delta = newEndMin - oldEndMin;
    if(delta === 0) return;

    var prevOldEnd = oldEndMin;
    for(var i = idx + 1; i < items.length; i++){
      var next = items[i];
      if(next.pinned) break;
      if(!next.time) break;
      var nextOldStart = timeToMinutes(next.time);
      if(nextOldStart !== prevOldEnd) break;  // gap exists — stop
      next.time = minutesToTimeStr(nextOldStart + delta);
      if(!next.duration) break;
      prevOldEnd = nextOldStart + next.duration;
    }
  }

  taskTimeInput.addEventListener("change", function(){
    const task = currentTask();
    if(!task) return;
    const oldEndMin = (task.time && task.duration) ? timeToMinutes(task.time) + task.duration : null;
    task.time = taskTimeInput.value || null;
    cascadeAfterTaskChange(task, oldEndMin);
    save("dl_schedule", schedule);
    renderSchedule();
  });

  taskDurInput.addEventListener("change", function(){
    const task = currentTask();
    if(!task) return;
    const oldEndMin = (task.time && task.duration) ? timeToMinutes(task.time) + task.duration : null;
    const v = parseInt(taskDurInput.value, 10);
    task.duration = v > 0 ? v : null;
    cascadeAfterTaskChange(task, oldEndMin);
    save("dl_schedule", schedule);
    renderSchedule();
  });

  taskNotesEl.addEventListener("input", function(){

    save("dl_schedule", schedule);
  });

  document.getElementById("task-add-photo-btn").addEventListener("click", function(){
    taskPhotoInput.click();
  });

  taskPhotoInput.addEventListener("change", function(){
    const task = currentTask();
    if(!task || !taskPhotoInput.files.length) return;
    taskPhotoError.textContent = "";
    Array.from(taskPhotoInput.files).forEach(function(file){
      compressImage(file, function(dataUrl){
        if(!task.images) task.images = [];
        task.images.push(dataUrl);
        const ok = save("dl_schedule", schedule);
        if(!ok){
          task.images.pop();
          taskPhotoError.textContent = "Couldn't save that photo — storage is full.";
        }
        renderTaskPhotos();
      }, function(){
        taskPhotoError.textContent = "Couldn't read that photo.";
      });
    });
    taskPhotoInput.value = "";
  });

  function compressImage(file, onDone, onError){
    const reader = new FileReader();
    reader.onload = function(){
      const img = new Image();
      img.onload = function(){
        const maxDim = 1000;
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * (maxDim/w)); w = maxDim; }
          else{ w = Math.round(w * (maxDim/h)); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        onDone(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.onerror = onError;
      img.src = reader.result;
    };
    reader.onerror = onError;
    reader.readAsDataURL(file);
  }

  document.getElementById("task-sheet-close").addEventListener("click", function(){
    taskOverlay.classList.remove("open");
    renderSchedule();

  let taskDeleteArmed = false;

  const taskDeleteBtn = document.getElementById("task-delete-btn");

  /* ---------- settings sheet ---------- */
  const settingsOverlay = document.getElementById("settings-overlay");

  /* ---------- wake-up time sheet ---------- */
  const wakeupOverlay = document.getElementById("wakeup-overlay");

  let wakeupDayKey = null;

  /* ---------- insert-task sheet ---------- */
  const insertOverlay = document.getElementById("insert-overlay");
  const insertTaskInput = document.getElementById("insert-task-input");
  const insertTimeSel = document.getElementById("insert-time-select");
  const insertDurSel = document.getElementById("insert-dur-select");
  let insertAfterIndex = 0, insertDayKey = null;

  function snapDuration(minutes){
    if(!minutes || minutes <= 0) return "";
    const opts = [15,30,45,60,90,120];
    if(minutes >= 120) return "120";
    let best = opts[0], bestDiff = Math.abs(minutes - best);
    opts.forEach(function(o){
      const d = Math.abs(minutes - o);
      if(d < bestDiff){ best = o; bestDiff = d; }
    });
    return String(best);
  }

  function openInsertSheet(dayKey, afterIndex, suggestedTimeStr, suggestedDuration){
    insertDayKey = dayKey;
    insertAfterIndex = afterIndex;
    insertTaskInput.value = "";
    insertTimeSel.value = suggestedTimeStr || "";
    if(suggestedDuration){
      insertDurSel.value = String(suggestedDuration);
    } else {
      insertDurSel.selectedIndex = 0;
    }
    insertOverlay.classList.add("open");
    setTimeout(function(){ insertTaskInput.focus(); }, 80);
  }

  document.getElementById("insert-sheet-close").addEventListener("click", function(){
    insertOverlay.classList.remove("open");
  });
  insertOverlay.addEventListener("click", function(e){
    if(e.target === insertOverlay) insertOverlay.classList.remove("open");
  });

  document.getElementById("insert-confirm-btn").addEventListener("click", function(){
    const text = insertTaskInput.value.trim();
    if(!text) return;
    const durVal = parseInt(insertDurSel.value, 10);
    const duration = durVal > 0 ? durVal : null;
    const time = insertTimeSel.value || null;
    if(!schedule[insertDayKey]) schedule[insertDayKey] = [];
    const list = schedule[insertDayKey];

    // Tasks that will be pushed back (timed, after insertion point)
    const timedTasks = list.filter(function(t){ return !t.allDay; });
    const tasksToShift = timedTasks.slice(insertAfterIndex);

    list.splice(insertAfterIndex, 0, { id: uid(), text: text, time: time, duration: duration, done: false, allDay: false });

    // Push subsequent timed tasks forward by the new task's duration (skip pinned)
    if(duration){
      tasksToShift.forEach(function(task){
        if(task.pinned) return;
        if(task.time){
          task.time = minutesToTimeStr(timeToMinutes(task.time) + duration);
        }
      });
    }

    save("dl_schedule", schedule);
    insertOverlay.classList.remove("open");
    renderSchedule();
  });
  insertTaskInput.addEventListener("keydown", function(e){
    if(e.key === "Enter") document.getElementById("insert-confirm-btn").click();
  });

  /* ---------- calendar sheet ---------- */
  const calOverlay = document.getElementById("cal-overlay");
  let calYear, calMonth;

  function openCalendar(){
    calYear = selectedDate.getFullYear();
    calMonth = selectedDate.getMonth();
    renderCalGrid();
    calOverlay.classList.add("open");
  }
  document.getElementById("sched-cal-btn").addEventListener("click", openCalendar);
  document.getElementById("cal-close").addEventListener("click", function(){ calOverlay.classList.remove("open"); });
  calOverlay.addEventListener("click", function(e){ if(e.target===calOverlay) calOverlay.classList.remove("open"); });
  document.getElementById("cal-prev-month").addEventListener("click", function(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalGrid(); });
  document.getElementById("cal-next-month").addEventListener("click", function(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalGrid(); });

  function renderCalGrid(){
    var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("cal-month-label").textContent = MONTHS[calMonth]+" "+calYear;
    var grid = document.getElementById("cal-grid");
    grid.innerHTML="";
    ["M","T","W","T","F","S","S"].forEach(function(d){
      var h=document.createElement("div"); h.className="cal-wd"; h.textContent=d; grid.appendChild(h);
    });
    var firstDay = new Date(calYear, calMonth, 1);
    var startOffset = firstDay.getDay()-1; if(startOffset<0) startOffset=6;
    var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    var daysInPrev = new Date(calYear, calMonth, 0).getDate();
    var todayKey = dateKey(today);
    var selKey = dateKey(selectedDate);
    var totalCells = Math.ceil((startOffset+daysInMonth)/7)*7;
    for(var i=0;i<totalCells;i++){
      var btn=document.createElement("button"); btn.className="cal-day";
      var d, month=calMonth, year=calYear, otherMonth=false;
      if(i<startOffset){ d=daysInPrev-startOffset+1+i; month=calMonth-1; if(month<0){month=11;year--;} otherMonth=true; }
      else if(i>=startOffset+daysInMonth){ d=i-startOffset-daysInMonth+1; month=calMonth+1; if(month>11){month=0;year++;} otherMonth=true; }
      else{ d=i-startOffset+1; }
      btn.textContent=d;
      var cellDate=new Date(year,month,d);
      var cellKey=dateKey(cellDate);
      if(otherMonth) btn.classList.add("other-month");
      if(cellKey===todayKey) btn.classList.add("today");
      if(cellKey===selKey) btn.classList.add("selected");
      (function(cd){
        btn.addEventListener("click",function(){
          selectedDate=cd;
          weekStart=startOfWeek(cd);
          calOverlay.classList.remove("open");
          renderSchedule();
          renderWorkout();
        });
      })(cellDate);
      grid.appendChild(btn);
    }
  }

  /* ---------- all-day section ---------- */
  var alldayListEl = document.getElementById("sched-allday-list");
  var alldayInputEl = document.getElementById("allday-input");

  function renderAlldayList(){
    var key = dateKey(selectedDate);
    var tasks = (schedule[key]||[]).filter(function(t){ return t.allDay; });
    alldayListEl.innerHTML="";
    if(tasks.length===0){
      alldayListEl.innerHTML='<div style="font-size:13px;color:var(--ink-faint);padding:4px 2px 6px 2px;">No all-day tasks</div>';
    }
    tasks.forEach(function(task){
      var card=document.createElement("div");
      card.className="allday-card";
      card.dataset.id=task.id;
      card.innerHTML=
        '<button class="checkbox '+(task.done?"done":"")+'">'+(task.done?"✓":"")+'</button>'+
        '<div class="task-text '+(task.done?"done":"")+'">'+escapeHtml(task.text)+'</div>'+
        '<button class="task-del">✕</button>';
      card.querySelector(".checkbox").addEventListener("click",function(e){
        e.stopPropagation(); task.done=!task.done; save("dl_schedule",schedule); renderAlldayList();
      });
      var del=card.querySelector(".task-del");
      del.addEventListener("click",function(e){
        e.stopPropagation();
        if(!del.classList.contains("confirm")){
          del.classList.add("confirm"); del.textContent="Sure?";
          setTimeout(function(){del.classList.remove("confirm");del.textContent="✕";},2500); return;
        }
        var list=schedule[key]||[];
        var i=list.findIndex(function(t){return t.id===task.id;});
        if(i>-1) list.splice(i,1);
        save("dl_schedule",schedule); renderAlldayList();
      });
      alldayListEl.appendChild(card);
    });
    makeAlldayCrossDraggable();
  }

  document.getElementById("allday-quick-add").addEventListener("click",function(){
    alldayInputEl.classList.toggle("visible");
    if(alldayInputEl.classList.contains("visible")) alldayInputEl.focus();
  });

  alldayInputEl.addEventListener("keydown",function(e){
    if(e.key==="Enter") addAlldayTask();
  });

  function addAlldayTask(){
    var text=alldayInputEl.value.trim(); if(!text) return;
    var key=dateKey(selectedDate);
    if(!schedule[key]) schedule[key]=[];
    schedule[key].unshift({id:uid(),text:text,allDay:true,done:false});
    save("dl_schedule",schedule);
    alldayInputEl.value=""; alldayInputEl.classList.remove("visible");
    renderAlldayList();
  }

  /* ---------- cross-section drag: all-day → timed ---------- */
  function makeAlldayCrossDraggable(){
    var LONG_PRESS_MS = 380;
    var cards = Array.from(alldayListEl.querySelectorAll(".allday-card"));
    cards.forEach(function(card){
      var timer=null, dragging=false, ghost=null, ghostOffsetY=0, startY=0;

      card.addEventListener("pointerdown",function(e){
        if(e.target.closest("button")) return;
        startY=e.clientY;
        clearTimeout(timer);
        timer=setTimeout(function(){
          dragging=true;
          ghost=document.createElement("div");
          ghost.id="drag-ghost";
          ghost.textContent=card.querySelector(".task-text").textContent;
          ghostOffsetY=e.clientY-card.getBoundingClientRect().top;
          ghost.style.top=(e.clientY-ghostOffsetY)+"px";
          document.body.appendChild(ghost);
          card.classList.add("dragging");
          try{card.setPointerCapture(e.pointerId);}catch(_){}
        },LONG_PRESS_MS);
      });

      card.addEventListener("pointermove",function(e){
        if(!dragging||!ghost) return;
        e.preventDefault();
        ghost.style.top=(e.clientY-ghostOffsetY)+"px";
        updateDropIndicator(e.clientY);
      },{passive:false});

      card.addEventListener("pointerup",function(e){
        clearTimeout(timer);
        if(!dragging){ cleanup(); return; }
        var timedRect=document.getElementById("sched-list").getBoundingClientRect();
        if(e.clientY>=timedRect.top){
          var insertIdx=getTimedInsertIndex(e.clientY);
          dropToTimed(card.dataset.id, insertIdx);
        }
        cleanup();
      });

      card.addEventListener("pointercancel",function(){ clearTimeout(timer); cleanup(); });

      function cleanup(){
        clearTimeout(timer); timer=null; dragging=false;
        if(ghost){ghost.remove();ghost=null;}
        card.classList.remove("dragging");
        clearDropIndicators();
      }
    });
  }

  function updateDropIndicator(clientY){
    clearDropIndicators();
    var timedRect=document.getElementById("sched-list").getBoundingClientRect();
    if(clientY<timedRect.top) return;
    var wrappers=Array.from(document.getElementById("sched-list").querySelectorAll(".reorderable"));
    var indicator=null;
    for(var i=0;i<wrappers.length;i++){
      var r=wrappers[i].getBoundingClientRect();
      if(clientY<r.top+r.height/2){
        indicator=wrappers[i]; break;
      }
    }
    var ind=document.createElement("div");
    ind.className="drop-indicator visible"; ind.id="active-drop-indicator";
    if(indicator) document.getElementById("sched-list").insertBefore(ind,indicator);
    else document.getElementById("sched-list").appendChild(ind);
  }

  function clearDropIndicators(){
    var old=document.getElementById("active-drop-indicator");
    if(old) old.remove();
  }

  function getTimedInsertIndex(clientY){
    var wrappers=Array.from(document.getElementById("sched-list").querySelectorAll(".reorderable"));
    for(var i=0;i<wrappers.length;i++){
      var r=wrappers[i].getBoundingClientRect();
      if(clientY<r.top+r.height/2) return i;
    }
    return wrappers.length;
  }

  function dropToTimed(taskId, insertIdx){
    var key=dateKey(selectedDate);
    var list=schedule[key]||[];
    var taskIdx=list.findIndex(function(t){return t.id===taskId;});
    if(taskIdx===-1) return;
    var task=list.splice(taskIdx,1)[0];
    task.allDay=false; task.time=null;
    var alldayCount=list.filter(function(t){return t.allDay;}).length;
    var absIdx=alldayCount+insertIdx;
    list.splice(absIdx,0,task);
    schedule[key]=list;
    save("dl_schedule",schedule);
    renderAlldayList();
    renderSchedule();
  }

  /* ---------- nav switching ---------- */
  const navBtns = document.querySelectorAll(".nav-btn");
  const views = { schedule: document.getElementById("view-schedule"), workout: document.getElementById("view-workout") };
  navBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      navBtns.forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      Object.keys(views).forEach(function(k){ views[k].classList.remove("active"); });
      views[btn.dataset.target].classList.add("active");
    });
  });

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
    });
  }

  /* ---------- init ---------- */
  goToday();
  renderSchedule();
  renderAlldayList();
  renderWorkout();
})();
